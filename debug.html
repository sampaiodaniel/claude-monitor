<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Claude Monitor - Debug</title>
  <style>
    body { background: #0f0f23; color: #ccc; font-family: monospace; padding: 20px; font-size: 13px; }
    h2 { color: #a0a0ff; }
    pre { background: #1a1a2e; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
    button { background: #252540; color: #a0a0ff; border: 1px solid #3a3a5e; border-radius: 6px; padding: 8px 16px; cursor: pointer; margin: 4px; }
    button:hover { background: #3a3a5e; }
    .danger { border-color: #e74c4c; color: #e74c4c; }
    .danger:hover { background: #3a1a1a; }
    .primary { border-color: #4CAF50; color: #4CAF50; }
    .primary:hover { background: #1a3a1a; }
  </style>
</head>
<body>
  <h2>Claude Monitor - Debug</h2>
  <button id="btn-diagnostic" class="primary">Diagnóstico Completo</button>
  <button id="btn-state">Ver Estado Atual</button>
  <button id="btn-force-fetch">Forçar Fetch Agora</button>
  <button id="btn-clear-cache" class="danger">Limpar Cache (forçar re-detecção)</button>
  <pre id="output">Clique num botão acima...</pre>
  <script src="debug.js"></script>
</body>
</html>
