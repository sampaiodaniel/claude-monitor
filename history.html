<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="settings.css">
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div class="page-header-left">
        <img class="logo-img" src="icons/icon-48.png" alt="Logo">
        <div>
          <h1>Claude Monitor</h1>
          <p class="subtitle">Histórico de Uso</p>
        </div>
      </div>
      <button id="settings-btn" class="btn-nav" title="Configurações">⚙️</button>
    </div>

    <div id="stats-summary" class="stats-summary hidden">
      <div class="stat-card">
        <div class="stat-label">Média por sessão</div>
        <div class="stat-value" id="avg-session">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sessões registradas</div>
        <div class="stat-value" id="total-sessions">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Média semanal</div>
        <div class="stat-value" id="avg-weekly">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Semanas com dados</div>
        <div class="stat-value" id="total-weeks">—</div>
      </div>
    </div>

    <div id="chart-section" class="chart-container hidden">
      <div class="chart-header">
        <h2>Uso por sessão (por dia)</h2>
        <div id="chart-pagination" class="chart-pagination hidden">
          <button id="chart-prev" class="chart-nav" disabled>‹</button>
          <span id="chart-page-info" class="chart-page-info"></span>
          <button id="chart-next" class="chart-nav" disabled>›</button>
        </div>
      </div>
      <canvas id="usage-chart"></canvas>
    </div>

    <div id="table-container"></div>

    <div id="pagination" class="pagination hidden">
      <button id="prev-btn" class="btn-secondary" disabled>← Anterior</button>
      <span id="page-info" class="page-info"></span>
      <button id="next-btn" class="btn-secondary" disabled>Próxima →</button>
    </div>
  </div>

  <script src="history.js"></script>
</body>
</html>
